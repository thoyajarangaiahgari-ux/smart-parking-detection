<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Parking Detection System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

display:flex;
justify-content:center;
align-items:flex-start;

padding:30px;

background:
linear-gradient(
rgba(0,0,0,0.70),
rgba(0,0,0,0.80)
),
url("https://images.unsplash.com/photo-1519501025264-65ba15a82390?auto=format&fit=crop&w=1920&q=80");

background-size:cover;
background-position:center;
background-attachment:fixed;

overflow-y:auto;
overflow-x:hidden;
}

.container{

width:100%;
max-width:1000px;

padding:40px;

margin:20px 0;

border-radius:30px;

background:rgba(255,255,255,0.08);

backdrop-filter:blur(18px);

box-shadow:
0 15px 50px rgba(0,0,0,0.4);

text-align:center;
}

.logo{

font-size:70px;

animation:float 3s infinite ease-in-out;
}

@keyframes float{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-10px);
}

}

.title{

font-size:48px;

font-weight:800;

line-height:1.1;

background:
linear-gradient(
90deg,
#38bdf8,
#22d3ee,
#06b6d4
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

margin-top:10px;
}

.subtitle{

font-size:20px;

color:#e2e8f0;

margin-top:20px;

margin-bottom:35px;
}

.upload-card{

padding:35px;

border:2px dashed rgba(255,255,255,0.25);

border-radius:25px;

background:rgba(255,255,255,0.05);

transition:0.3s;
}

.upload-card:hover{

border-color:#38bdf8;
}

input[type=file]{

width:100%;

padding:15px;

color:white;
}

input[type=file]::file-selector-button{

padding:14px 25px;

border:none;

border-radius:10px;

background:#2563eb;

color:white;

font-weight:600;

cursor:pointer;
}

.preview{

display:none;

margin-top:25px;

width:100%;

max-height:350px;

object-fit:cover;

border-radius:20px;

box-shadow:
0 8px 25px rgba(0,0,0,0.3);
}

.predict-btn{

width:100%;

padding:18px;

margin-top:30px;

font-size:20px;

font-weight:600;

border:none;

border-radius:15px;

cursor:pointer;

color:white;

background:
linear-gradient(
135deg,
#2563eb,
#06b6d4
);

transition:0.3s;
}

.predict-btn:hover{

transform:translateY(-3px);

box-shadow:
0 10px 25px rgba(37,99,235,0.4);
}

.features{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:20px;

margin-top:40px;
}

.feature{

padding:25px;

border-radius:20px;

background:rgba(255,255,255,0.05);
}

.feature h3{

font-size:28px;

color:white;

margin-bottom:8px;
}

.feature p{

color:#cbd5e1;
}

.footer{

margin-top:35px;

font-size:16px;

color:#94a3b8;
}

@media(max-width:768px){

.title{
font-size:34px;
}

.subtitle{
font-size:16px;
}

.features{
grid-template-columns:1fr;
}

.container{
padding:25px;
}

.logo{
font-size:55px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="logo">🚗</div>

<div class="title">
SMART PARKING<br>
DETECTION SYSTEM
</div>

<div class="subtitle">
AI Powered Parking Occupancy Detection Using Deep Learning
</div>

<form
action="/predict"
method="POST"
enctype="multipart/form-data">

<div class="upload-card">

<input
type="file"
name="image"
accept="image/*"
required
onchange="previewImage(event)">

<img
id="preview"
class="preview">

</div>

<button
type="submit"
class="predict-btn">

Analyze Parking Space

</button>

</form>

<div class="features">

<div class="feature">
<h3>96%</h3>
<p>Model Accuracy</p>
</div>

<div class="feature">
<h3>CNN</h3>
<p>Deep Learning Model</p>
</div>

<div class="feature">
<h3>AI</h3>
<p>Smart Parking Analysis</p>
</div>

</div>

<div class="footer">
Smart Parking Detection System • Deep Learning Project
</div>

</div>

<script>

function previewImage(event){

const preview =
document.getElementById("preview");

preview.src =
URL.createObjectURL(
event.target.files[0]
);

preview.style.display="block";
}

</script>

</body>
</html>
